[[rules]]
id = "stellar-secret-key"
description = "Stellar Secret Key"
regex = '''S[A-Z0-9]{55}'''
tags = ["stellar", "secret"]

[allowlist]
description = "Allowlisted paths for docs, examples, and test fixtures"
paths = [
  '''\.env\.example$''',
  '''\.env\.docker$''',
  '''env\.example$''',
  '''\.md$''',
  '''wasm-demo/fixtures\.js$''',
]
