name: Playwright E2E – Admin Dashboard

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: admin-dashboard

    env:
      # NextAuth credentials for the test admin user
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      ADMIN_PASSWORD_HASH: ${{ secrets.E2E_ADMIN_PASSWORD_HASH }}
      # Plain-text password used by Playwright to fill the login form
      ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      # Required by playwright.config.ts to override the base URL when needed
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test
        # Tests that require auth credentials will be skipped gracefully
        # when ADMIN_EMAIL / ADMIN_PASSWORD secrets are not configured.
        continue-on-error: false

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: admin-dashboard/test-results/
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: admin-dashboard/playwright-report/
          retention-days: 7
