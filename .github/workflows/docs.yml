name: Generate and Publish Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (root)
        run: npm ci

      - name: Generate Client Docs
        run: |
          cd client
          npm install
          npm run docs

      - name: Generate Server Docs
        run: |
          cd server
          npm install
          npm run docs

      - name: Generate Dashboard Docs
        run: |
          cd admin-dashboard
          npm install
          npm run docs

      - name: Generate Rust Docs
        run: cargo doc --workspace --no-deps

      - name: Assemble Documentation Portal
        run: |
          mkdir -p public/client
          mkdir -p public/server
          mkdir -p public/dashboard
          mkdir -p public/rust
          
          # Copy landing page
          cp docs/index.html public/
          
          # Copy generated docs
          cp -r client/docs/* public/client/
          cp -r server/docs/* public/server/
          cp -r admin-dashboard/docs/* public/dashboard/
          cp -r target/doc/* public/rust/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
