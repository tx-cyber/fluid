name: Server Signing Benchmark

on:
  push:
    paths-ignore:
      - "server/benchmarks/signing-report.md"
    paths:
      - ".github/workflows/server-signing-benchmark.yml"
      - "server/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run signing benchmark
        run: npm run benchmark:signing

      - name: Commit benchmark report
        run: |
          if [ -z "$(git status --short -- benchmarks/signing-report.md)" ]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/signing-report.md
          git commit -m "chore: update signing benchmark report [skip ci]"
          git push

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: server-signing-benchmark-report
          path: server/benchmarks/signing-report.md
