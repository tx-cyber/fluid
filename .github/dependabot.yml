      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "cargo"
    directory: "/fluid-cli"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dependabot"
      - "cargo"
      - "fluid-cli"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "cargo"
    directory: "/server"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dependabot"
      - "cargo"
      - "server"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"
